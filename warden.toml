version = 1

[defaults]
failOn = "high"
reportOn = "medium"

[[skills]]
name = "mcp-audit"
paths = [
  "docs/adding-tools.md",
  "packages/mcp-core/src/server.ts",
  "packages/mcp-core/src/server.test.ts",
  "packages/mcp-core/src/skillDefinitions.json",
  "packages/mcp-core/src/toolDefinitions.json",
  "packages/mcp-core/src/tools/**",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]
