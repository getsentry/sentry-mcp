name: Eval

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/mcp-core/src/tools/**"
      - "packages/mcp-core/src/internal/agents/**"
      - "packages/mcp-server-evals/**"
      - "packages/mcp-server-mocks/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "packages/mcp-core/src/tools/**"
      - "packages/mcp-core/src/internal/agents/**"
      - "packages/mcp-server-evals/**"
      - "packages/mcp-server-mocks/**"
      - ".github/workflows/eval.yml"

jobs:
  eval:
    environment: Actions
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # pnpm/action-setup@v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda
        name: Install pnpm
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

      - name: Run evals
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: pnpm --filter @sentry/mcp-server-evals eval:ci
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Report eval results
        uses: getsentry/vitest-evals@v0
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          results: packages/mcp-server-evals/eval-results.json
          publish-check: true
          check-name: Evaluation Results
          fail-on-failures: true
